# Portal Scanner Configuration - Ammratansh Ghildyal
# Tailored for: Data/Business/Product Analytics, BI, AI/ML Analyst roles in the US
# Copy of portals.example.yml, customized for Ammratansh's job search

title_filter:
  positive:
    # -- Analytics & BI roles --
    - "Data Analyst"
    - "Business Analyst"
    - "Analytics"
    - "Business Intelligence"
    - "BI Analyst"
    - "Product Analyst"
    - "Marketing Analyst"
    - "Insights Analyst"
    - "Data Scientist"
    - "Analytics Engineer"
    - "Analytics Manager"
    - "Decision Scientist"
    - "Quantitative Analyst"
    # -- AI/ML related --
    - "AI Analyst"
    - "ML Analyst"
    - "GenAI"
    - "LLM"
    - "Applied AI"
    # -- Strategy / consulting --
    - "Strategy Analyst"
    - "Operations Analyst"
    - "Financial Analyst"
    - "Risk Analyst"
  negative:
    - "Intern"
    - "Junior"
    - "Entry Level"
    - "iOS"
    - "Android"
    - "Frontend"
    - "Backend Developer"
    - "Software Engineer"
    - "DevOps"
    - "Blockchain"
    - "Crypto"
    - "Web3"
    - "COBOL"
    - "Mainframe"
    - "SAP "
    - "Embedded"
    - "Firmware"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Manager"
    - "Principal"
    - "Staff"
    - "Head"
    - "Director"

search_queries:
  # -- Greenhouse --
  - name: Greenhouse — Data Analyst
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Data Analyst" OR "Business Analyst" OR "Analytics Manager" remote US'
    enabled: true
  - name: Greenhouse — Product Analyst
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Analyst" OR "Analytics Engineer" OR "BI Analyst" remote US'
    enabled: true
  - name: Greenhouse — AI/ML Analyst
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Analyst" OR "Data Scientist" OR "Applied AI" remote US'
    enabled: true
  # -- Ashby --
  - name: Ashby — Data & Analytics
    query: 'site:jobs.ashbyhq.com "Data Analyst" OR "Analytics Manager" OR "Business Intelligence" remote'
    enabled: true
  - name: Ashby — Product & Insights Analyst
    query: 'site:jobs.ashbyhq.com "Product Analyst" OR "Insights Analyst" OR "Analytics Engineer" remote'
    enabled: true
  # -- LinkedIn / broad boards --
  - name: LinkedIn — Senior Data Analyst US
    query: '"Senior Data Analyst" OR "Analytics Manager" SQL Python Tableau remote United States'
    enabled: true
  - name: LinkedIn — Business Intelligence Analyst
    query: '"Business Intelligence Analyst" OR "BI Manager" SQL Tableau OR "Power BI" OR Looker remote US'
    enabled: true
  - name: LinkedIn — Product Analytics
    query: '"Product Analyst" OR "Growth Analyst" SQL Python fintech OR banking OR "financial services" remote US'
    enabled: true
  # -- Financial services / banking --
  - name: FinTech — Data & Analytics
    query: 'site:boards.greenhouse.io OR site:jobs.ashbyhq.com "Data Analyst" OR "Analytics" fintech OR banking OR payments remote US'
    enabled: true
  # -- Consulting / Strategy --
  - name: Consulting — Analytics
    query: '"Analytics Consultant" OR "Data Strategy" OR "Decision Scientist" SQL Python remote US'
    enabled: true
  # -- Remote job boards --
  - name: WeWorkRemotely — Analytics
    query: 'site:weworkremotely.com "Data Analyst" OR "Business Analyst" OR "Analytics" SQL Python'
    enabled: true
  - name: Himalayas — Analytics US
    query: 'site:himalayas.app "Data Analyst" OR "Business Analyst" OR "Analytics Manager" SQL United States'
    enabled: true

